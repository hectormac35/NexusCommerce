services:
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: nexuscommerce-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  postgres-catalogo:
    image: postgres:18-alpine
    container_name: nexuscommerce-postgres-catalogo
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_catalogo
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
    ports:
      - "55432:5432"
    volumes:
      - nexuscommerce_catalogo_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_catalogo"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-identidad:
    image: postgres:18-alpine
    container_name: nexuscommerce-postgres-identidad
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_identidad
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
    ports:
      - "55433:5432"
    volumes:
      - nexuscommerce_identidad_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_identidad"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: nexuscommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: nexus
      RABBITMQ_DEFAULT_PASS: nexus_rabbit_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - nexuscommerce_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/Catalog.Api/Dockerfile
    container_name: nexuscommerce-catalog-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Catalogo: Host=postgres-catalogo;Port=5432;Database=nexus_catalogo;Username=nexus;Password=nexus_dev_password
      Jwt__Clave: NexusCommerce-Development-Key-2026-Muy-Segura-Para-JWT
      Jwt__Emisor: NexusCommerce.Identity
      Jwt__Audiencia: NexusCommerce.Clientes
      RabbitMq__Host: rabbitmq
      RabbitMq__Puerto: 5672
      RabbitMq__Usuario: nexus
      RabbitMq__Contrasena: nexus_rabbit_password
      RabbitMq__VirtualHost: /
      RabbitMq__Exchange: nexuscommerce.eventos
      RabbitMq__NombreCliente: NexusCommerce.Catalog
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
    ports:
      - "5101:8080"
    depends_on:
      postgres-catalogo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:8080/health/ready > /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/NexusCommerce.Gateway/Dockerfile
    container_name: nexuscommerce-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ReverseProxy__Clusters__cluster-catalogo__Destinations__catalogo-api__Address: http://catalog-api:8080/
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
    ports:
      - "5000:8080"
    depends_on:
      catalog-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:8080/health/ready > /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  nexuscommerce_identidad_data:
  nexuscommerce_catalogo_data:
  nexuscommerce_rabbitmq_data:
