apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: nexuscommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: cr.jaegertracing.io/jaegertracing/jaeger:2.20.0
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 16686
          readinessProbe:
            tcpSocket:
              port: 16686
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: nexuscommerce
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: interfaz
      port: 16686
      targetPort: 16686
      nodePort: 30686
