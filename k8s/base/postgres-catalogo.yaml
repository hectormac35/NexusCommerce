apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-catalogo-datos
  namespace: nexuscommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-catalogo
  namespace: nexuscommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-catalogo
  template:
    metadata:
      labels:
        app: postgres-catalogo
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: nexus_catalogo
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nexuscommerce-secrets
                  key: postgres-usuario
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexuscommerce-secrets
                  key: postgres-contrasena
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - nexus
                - -d
                - nexus_catalogo
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - nexus
                - -d
                - nexus_catalogo
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: datos
              mountPath: /var/lib/postgresql
      volumes:
        - name: datos
          persistentVolumeClaim:
            claimName: postgres-catalogo-datos
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-catalogo
  namespace: nexuscommerce
spec:
  selector:
    app: postgres-catalogo
  ports:
    - port: 5432
      targetPort: 5432
