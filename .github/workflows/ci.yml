name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build y pruebas
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Mostrar versión de .NET
        run: dotnet --info

      - name: Restaurar dependencias
        run: dotnet restore NexusCommerce.slnx

      - name: Comprobar formato
        run: dotnet format NexusCommerce.slnx --verify-no-changes --no-restore

      - name: Compilar
        run: >
          dotnet build NexusCommerce.slnx
          --configuration Release
          --no-restore
          --verbosity minimal

      - name: Ejecutar pruebas
        run: >
          dotnet test NexusCommerce.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=resultados-pruebas.trx"
          --results-directory TestResults

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-pruebas
          path: TestResults
          if-no-files-found: ignore
          retention-days: 7

  docker-build:
    name: Validar imágenes Docker
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar Docker Compose
        run: docker compose config --quiet

      - name: Construir imágenes
        run: docker compose build --pull
